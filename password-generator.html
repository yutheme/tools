<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密码生成器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css">
<style>
  body{background:linear-gradient(135deg,#0f172a,#334155);min-height:100vh}
  .card{background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}
  input[type="number"]{-moz-appearance:textfield}input[type="number"]::-webkit-outer-spin-button,-webkit-appearance-button{-moz-appearance:textfield}
</style>
</head>
<body class="flex items-center justify-center p-4">
<div class="w-full max-w-md card rounded-2xl p-6 text-white shadow-2xl">
  <h1 class="text-2xl font-bold mb-2">密码生成器</h1>
  <p class="text-gray-300 mb-4">前端本地生成，不会上传</p>
  <div class="grid grid-cols-2 gap-3 mb-4">
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="incLower" checked class="text-blue-400">小写</label>
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="incUpper" checked class="text-blue-400">大写</label>
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="incDigit" checked class="text-blue-400">数字</label>
    <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="incSymb" class="text-blue-400">符号</label>
  </div>
  <div class="flex gap-3 mb-4">
    <input type="number" id="len" min="1" max="128" value="16" class="flex-1 rounded bg-white/10 border-white/20 text-white placeholder-gray-400 p-2 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400" placeholder="长度">
    <button onclick="generate()" class="bg-blue-600 hover:bg-blue-500 text-white rounded px-4 font-medium">生成</button>
  </div>
  <div class="relative mb-4">
    <textarea id="result" readonly class="w-full h-24 rounded bg-white/5 border-white/20 text-white p-3 font-mono focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 resize-none" placeholder="生成的密码将显示在这里"></textarea>
    <button onclick="copyToClipboard()" class="absolute top-2 right-2 bg-white/10 hover:bg-white/20 text-white rounded px-3 py-1 text-xs font-medium">复制</button>
  </div>
  <div id="entropy" class="text-xs text-gray-400"></div>
</div>
<script>
const chars = {lower:'abcdefghijklmnopqrstuvwxyz',upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',digit:'0123456789',symb:'!@#$%^&*()_+-=[]{}|;:,.<>?'};
function getSelected(){
  return {lower:document.getElementById('incLower').checked,upper:document.getElementById('incUpper').checked,digit:document.getElementById('incDigit').checked,symb:document.getElementById('incSymb').checked};
}
function generate(){
  const {lower,upper,digit,symb}=getSelected();
  let pool='';if(lower)pool+=chars.lower;if(upper)pool+=chars.upper;if(digit)pool+=chars.digit;if(symb)pool+=chars.symb;
  if(!pool){document.getElementById('result').value='请至少选择一种字符集';return;}
  const len=Math.max(1,Math.min(128,parseInt(document.getElementById('len').value||'16',10)));
  let out='',randomValues=new Uint8Array(len);crypto.getRandomValues(randomValues);
  for(let i=0;i<len;i++)out+=pool[randomValues[i]%pool.length];
  document.getElementById('result').value=out;
  const bits=Math.log2(pool.length)*len;
  document.getElementById('entropy').textContent=`熵: ${bits.toFixed(1)} bit ≈ ${(bits/8).toFixed(1)} 字节`;
}
function copyToClipboard(){
  const el=document.getElementById('result');el.select();document.execCommand('copy');navigator.vibrate&&navigator.vibrate(30);
}
document.querySelectorAll('input[type="checkbox"]').forEach(c=>c.addEventListener('change',generate));
document.getElementById('len').addEventListener('change',generate);
generate();
</script>
</body>
</html>
