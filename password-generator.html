<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --primary: #165DFF;
            --primary-light: rgba(22, 93, 255, 0.1);
            --secondary: #36CFC9;
            --neutral: #F5F7FA;
            --dark: #1D2129;
            --gray-100: #F5F7FA;
            --gray-200: #E5E7EB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--gray-100) 0%, white 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            transition: var(--transition);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header h1 i {
            margin-right: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
        }

        .form-group label i {
            color: var(--primary);
            width: 1rem;
            text-align: center;
            margin-right: 0.5rem;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--dark);
        }

        .checkbox-item input[type="checkbox"] {
            accent-color: var(--primary);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input[type="number"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0E4FD9;
            transform: translateY(-1px);
        }

        .result-container {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
            transition: var(--transition);
            outline: none;
            background: var(--gray-100);
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .copy-btn:hover {
            background-color: #0E4FD9;
        }

        .entropy-info {
            font-size: 0.875rem;
            color: var(--gray-500);
            padding: 0.75rem;
            background: var(--gray-100);
            border-radius: 8px;
        }

        @media (max-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-lock"></i>密码生成器</h1>
            <p>前端本地生成，不会上传</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label><i class="fas fa-check-square"></i>字符集选择</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="incLower" checked>小写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incUpper" checked>大写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incDigit" checked>数字
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incSymb">符号
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-sort-numeric-up"></i>密码长度</label>
                <div class="input-group">
                    <input type="number" id="len" min="1" max="128" value="16" placeholder="输入长度">
                    <button onclick="generate()" class="btn btn-primary">
                        <i class="fas fa-magic"></i>生成
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i>生成结果</label>
                <div class="result-container">
                    <textarea id="result" readonly placeholder="生成的密码将显示在这里"></textarea>
                    <button onclick="copyToClipboard()" class="copy-btn">
                        <i class="fas fa-clipboard"></i>复制
                    </button>
                </div>
            </div>

            <div class="entropy-info" id="entropy"></div>
        </div>
    </div>

    <script>
        const chars = {
            lower: 'abcdefghijklmnopqrstuvwxyz',
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            digit: '0123456789',
            symb: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        function getSelected() {
            return {
                lower: document.getElementById('incLower').checked,
                upper: document.getElementById('incUpper').checked,
                digit: document.getElementById('incDigit').checked,
                symb: document.getElementById('incSymb').checked
            };
        }

        function generate() {
            const { lower, upper, digit, symb } = getSelected();
            let pool = '';
            if (lower) pool += chars.lower;
            if (upper) pool += chars.upper;
            if (digit) pool += chars.digit;
            if (symb) pool += chars.symb;
            
            if (!pool) {
                document.getElementById('result').value = '请至少选择一种字符集';
                return;
            }
            
            const len = Math.max(1, Math.min(128, parseInt(document.getElementById('len').value || '16', 10)));
            let out = '';
            const randomValues = new Uint8Array(len);
            crypto.getRandomValues(randomValues);
            
            for (let i = 0; i < len; i++) {
                out += pool[randomValues[i] % pool.length];
            }
            
            document.getElementById('result').value = out;
            const bits = Math.log2(pool.length) * len;
            document.getElementById('entropy').textContent = `熵: ${bits.toFixed(1)} bit ≈ ${(bits / 8).toFixed(1)} 字节`;
        }

        function copyToClipboard() {
            const el = document.getElementById('result');
            el.select();
            document.execCommand('copy');
            navigator.vibrate && navigator.vibrate(30);
        }

        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.addEventListener('change', generate));
        document.getElementById('len').addEventListener('change', generate);
        generate();
    </script>
</body>
</html>
