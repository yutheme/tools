<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 高强度随机密码生成</title>
        <link rel="icon" type="image/png" href="icons/password-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="icons/password.svg">
    <link rel="shortcut icon" href="icons/password-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/password-apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        :root {
            --color-primary: var(--color-tool-password);
            --color-primary-dark: var(--color-tool-password-dark);
            --color-primary-light: var(--color-tool-password-light);
            --color-primary-ring: var(--color-tool-password-ring);
        }
        /* ========== 页面特有样式 ========== */
        body {
            background-color: var(--color-gray-50);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            transition: var(--transition-normal);
        }

        /* 宽屏双列布局 */
        @media (min-width: 768px) {
            .content {
                display: grid !important;
                grid-template-columns: 1fr 1fr;
                gap: 1.5rem;
            }
        }

        .header {
            background: var(--color-primary);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header h1 i {
            margin-right: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
        }

        .form-group label i {
            color: var(--color-primary);
            width: 1rem;
            text-align: center;
            margin-right: 0.5rem;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .template-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn-template {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid var(--color-gray-200);
            background: white;
            color: var(--color-gray-500);
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .btn-template:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--dark);
        }

        .checkbox-item input[type="checkbox"] {
            accent-color: var(--color-primary);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        input[type="number"],
        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-200);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition-normal);
            outline: none;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-ring);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background-color: var(--color-gray-200);
            color: var(--color-gray-700);
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
        }

        .btn-secondary:active {
            transform: scale(0.97);
        }

        /* 历史记录分页 */
        .history-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.25rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--color-gray-200);
        }

        .page-btn {
            min-width: 2rem;
            height: 2rem;
            border: 1px solid var(--color-gray-200);
            background: white;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition-normal);
        }

        .page-btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .page-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 返回首页导航 */
        .back-home {
            padding: 1rem 1.5rem;
            text-align: center;
            border-top: 1px solid var(--color-gray-200);
            background: var(--color-gray-50);
        }
        .back-home a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            transition: var(--transition-normal);
        }
        .back-home a:hover {
            background-color: var(--color-primary-light);
        }

        .result-container {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-200);
            border-radius: 8px;
            font-size: 1rem;
            font-family: monospace;
            resize: vertical;
            transition: var(--transition-normal);
            outline: none;
            background: var(--color-gray-100);
        }

        textarea:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-ring);
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-normal);
        }

        .copy-btn:hover {
            background-color: #0E4FD9;
        }

        .strength-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .strength-bar {
            display: flex;
            gap: 0.25rem;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }

        .strength-segment {
            flex: 1;
            background: var(--color-gray-200);
            transition: var(--transition-normal);
        }

        .strength-segment.active:nth-child(1) { background: #F53F3F; }
        .strength-segment.active:nth-child(2) { background: #FF7D00; }
        .strength-segment.active:nth-child(3) { background: #00B42A; }
        .strength-segment.active:nth-child(4) { background: #0052D9; }

        .strength-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .strength-label {
            font-weight: 500;
        }

        .strength-label.weak { color: #F53F3F; }
        .strength-label.medium { color: #FF7D00; }
        .strength-label.strong { color: #00B42A; }
        .strength-label.very-strong { color: #0052D9; }

        .crack-time {
            color: var(--color-gray-500);
        }

        .history-container {
            margin-top: 0.5rem;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: var(--color-gray-100);
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .history-password {
            color: var(--dark);
            cursor: pointer;
            flex: 1;
            margin-right: 0.5rem;
        }

        .history-password:hover {
            color: var(--color-primary);
        }

        .btn-history-copy {
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            border: none;
            background: var(--color-primary);
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .entropy-info {
            font-size: 0.875rem;
            color: var(--color-gray-500);
            padding: 0.75rem;
            background: var(--color-gray-100);
            border-radius: 8px;
        }

        @media (max-width: 480px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }

            .template-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-lock"></i>密码生成器</h1>
            <p>前端本地生成，不会上传</p>
        </div>
        
        <div class="content">
            <div class="form-group">
                <label><i class="fas fa-check-square"></i>字符集选择</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="incLower" checked>小写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incUpper" checked>大写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incDigit" checked>数字
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incSymb">符号
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="excludeAmbiguous" checked>排除易混淆字符
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-cog"></i>自定义特殊字符
                    <span style="font-weight: normal; color: var(--color-gray-400);">(只在勾选"符号"时生效)</span>
                </label>
                <input type="text" id="customSymbs" placeholder="例如: !@#$%" value="!@#$%^&*()_+-=[]{}|;:,.<>?">
            </div>

            <div class="form-group">
                <label><i class="fas fa-bookmark"></i>常用模板</label>
                <div class="template-group">
                    <button class="btn-template" onclick="applyTemplate('website')">网站密码 (大小写+数字+8位)</button>
                    <button class="btn-template" onclick="applyTemplate('wifi')">WiFi密码 (12位纯数字)</button>
                    <button class="btn-template" onclick="applyTemplate('server')">服务器密钥 (16位混合)</button>
                    <button class="btn-template" onclick="applyTemplate('pin')">支付密码 (6位纯数字)</button>
                    <button class="btn-template" onclick="applyTemplate('userpass')">账号密码 (用户名8位+密码12位)</button>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <i class="fas fa-user"></i>生成用户名
                    <input type="checkbox" id="generateUsername" style="margin-left: 0.5rem;">
                </label>
                <div class="input-group">
                    <input type="number" id="usernameLen" min="3" max="32" value="8" placeholder="用户名长度">
                    <select id="usernameCase" style="padding: 0.75rem 1rem; border: 1px solid var(--color-gray-200); border-radius: 8px; flex: 1;">
                        <option value="lower">全小写</option>
                        <option value="camel">驼峰式 (首字母小写)</option>
                        <option value="pascal">驼峰式 (首字母大写)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-sort-numeric-up"></i>密码长度 / 数量</label>
                <div class="input-group">
                    <input type="number" id="len" min="1" max="128" value="16" placeholder="密码长度">
                    <input type="number" id="count" min="1" max="20" value="1" placeholder="数量">
                    <button onclick="generate()" class="btn btn-primary">
                        <i class="fas fa-magic"></i>生成
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i>生成结果</label>
                <!-- 用户名结果 -->
                <div id="usernameResult" class="username-result" style="display: none; margin-bottom: 0.75rem; padding: 0.75rem 1rem; background: var(--color-gray-50); border: 1px solid var(--color-gray-200); border-radius: 8px; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-weight: 500; font-size: 0.875rem;">用户名:</span>
                    <code id="usernameOutput" style="flex: 1; font-family: monospace; font-size: 1rem; background: white; padding: 0.25rem 0.5rem; border-radius: 4px;"></code>
                    <button class="btn btn-sm btn-secondary" onclick="copyUsername()" title="复制用户名">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <div class="result-container">
                    <textarea id="result" readonly placeholder="生成的密码将显示在这里"></textarea>
                    <button onclick="copyPasswordResult()" class="copy-btn">
                        <i class="fas fa-clipboard"></i>复制
                    </button>
                </div>
                <label class="checkbox-item" style="margin-top: 0.75rem;">
                    <input type="checkbox" id="saveHistory">保存到本地历史（明文，仅本机）
                </label>
                <div class="history-container" id="historyContainer" style="display: none;">
                    <label style="font-size: 0.8rem; color: var(--color-gray-500); display: flex; justify-content: space-between; align-items: center;">
                        最近生成记录（最多10条）
                        <button onclick="clearHistory()" class="btn btn-sm btn-secondary">清空</button>
                    </label>
                    <div class="history-list" id="historyList"></div>
                    <div class="history-pagination" id="historyPagination"></div>
                </div>
            </div>

            <div class="form-group">
                <div class="strength-container">
                    <div class="strength-bar">
                        <div class="strength-segment" id="seg1"></div>
                        <div class="strength-segment" id="seg2"></div>
                        <div class="strength-segment" id="seg3"></div>
                        <div class="strength-segment" id="seg4"></div>
                    </div>
                    <div class="strength-info">
                        <span class="strength-label" id="strengthLabel"></span>
                        <span class="crack-time" id="crackTime"></span>
                    </div>
                </div>
            </div>
            <div class="form-group" style="display: flex; gap: 0.5rem;">
                <button onclick="copyAll()" class="btn btn-success" style="flex: 1;">
                    <i class="fas fa-copy"></i>复制全部 (用户名+密码)
                </button>
                <button onclick="clearAll()" class="btn btn-secondary" style="flex: 0 0 auto;">
                    <i class="fas fa-trash"></i>清空
                </button>
            </div>
            <div class="entropy-info" id="entropy"></div>
        </div>
    </div>

    <script src="js/utils/toast.js"></script>
    <script src="js/utils/copy.js"></script>
    <script>
        const defaultChars = {
            lower: 'abcdefghijklmnopqrstuvwxyz',
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            digit: '0123456789',
            symb: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        // 易混淆字符列表
        const ambiguousChars = new Set(['0', 'O', 'o', '1', 'l', 'I', '2', 'Z', '5', 'S']);

        function getSelected() {
            return {
                lower: document.getElementById('incLower').checked,
                upper: document.getElementById('incUpper').checked,
                digit: document.getElementById('incDigit').checked,
                symb: document.getElementById('incSymb').checked,
                excludeAmbiguous: document.getElementById('excludeAmbiguous').checked,
                generateUsername: document.getElementById('generateUsername').checked,
                usernameLen: parseInt(document.getElementById('usernameLen').value || '8', 10),
                usernameCase: document.getElementById('usernameCase').value
            };
        }

        function generate() {
            const { lower, upper, digit, symb, excludeAmbiguous, generateUsername, usernameLen, usernameCase } = getSelected();
            let pool = '';
            if (lower) pool += defaultChars.lower;
            if (upper) pool += defaultChars.upper;
            if (digit) pool += defaultChars.digit;
            if (symb) {
                // 使用自定义特殊字符
                const customSymbs = document.getElementById('customSymbs').value;
                pool += customSymbs || defaultChars.symb;
            }

            // 排除易混淆字符
            if (excludeAmbiguous) {
                pool = Array.from(pool).filter(c => !ambiguousChars.has(c)).join('');
            }
            
            if (!pool) {
                document.getElementById('result').value = '请至少选择一种字符集';
                return;
            }
            
            // 处理用户名生成
            let username = '';
            if (generateUsername) {
                document.getElementById('usernameResult').style.display = 'flex';
                username = generateUsernameString(usernameLen, usernameCase);
                document.getElementById('usernameOutput').textContent = username;
            } else {
                document.getElementById('usernameResult').style.display = 'none';
            }
            
            const len = Math.max(1, Math.min(128, parseInt(document.getElementById('len').value || '16', 10)));
            const count = Math.max(1, Math.min(20, parseInt(document.getElementById('count').value || '1', 10)));
            let out = '';
            
            for (let n = 0; n < count; n++) {
                let password = '';
                const randomValues = new Uint8Array(len);
                crypto.getRandomValues(randomValues);
                
                for (let i = 0; i < len; i++) {
                    password += pool[randomValues[i] % pool.length];
                }
                
                out += password + (count > 1 ? '\n' : '');
            }
            
            document.getElementById('result').value = out;
            const bits = Math.log2(pool.length) * len;
            document.getElementById('entropy').textContent = `熵: ${bits.toFixed(1)} bit ≈ ${(bits / 8).toFixed(1)} 字节`;
            updateStrengthDisplay(bits);

            // 只有用户明确勾选时，才保存到本地明文历史
            if (document.getElementById('saveHistory').checked) {
                if (count === 1) {
                    saveToHistory(out.trim());
                } else {
                    out.split('\n').forEach(p => {
                        if (p.trim()) saveToHistory(p.trim());
                    });
                }
            }
            renderHistory();
        }

        // 格式化破解时间显示
        function formatCrackTime(seconds) {
            if (seconds < 1) return '瞬间破解';
            if (seconds < 60) return `${seconds.toFixed(0)} 秒`;
            if (seconds < 3600) return `${(seconds / 60).toFixed(0)} 分钟`;
            if (seconds < 86400) return `${(seconds / 3600).toFixed(0)} 小时`;
            if (seconds < 31536000) return `${(seconds / 86400).toFixed(0)} 天`;
            if (seconds < 31536000 * 100) return `${(seconds / 31536000).toFixed(0)} 年`;
            if (seconds < 31536000 * 1000000) return `${(seconds / 31536000).toFixed(0)} 年`;
            return '超过100万年';
        }

        // 更新密码强度显示
        function updateStrengthDisplay(bits) {
            let level, label, colorClass;
            if (bits < 40) {
                level = 1;
                label = '弱';
                colorClass = 'weak';
            } else if (bits < 60) {
                level = 2;
                label = '中';
                colorClass = 'medium';
            } else if (bits < 80) {
                level = 3;
                label = '强';
                colorClass = 'strong';
            } else {
                level = 4;
                label = '极强';
                colorClass = 'very-strong';
            }

            // 更新进度条
            for (let i = 1; i <= 4; i++) {
                const seg = document.getElementById(`seg${i}`);
                if (i <= level) {
                    seg.classList.add('active');
                } else {
                    seg.classList.remove('active');
                }
            }

            // 更新标签
            const labelEl = document.getElementById('strengthLabel');
            labelEl.textContent = `密码强度: ${label}`;
            labelEl.className = `strength-label ${colorClass}`;

            // 计算预估暴力破解时间（假设每秒尝试10亿次）
            const combinations = Math.pow(2, bits);
            const guessesPerSecond = 1e9;
            const avgTimeSeconds = (combinations / guessesPerSecond) / 2;
            document.getElementById('crackTime').textContent = `暴力破解预估: ${formatCrackTime(avgTimeSeconds)}`;
         }

         // 保存密码到历史记录
         function saveToHistory(password) {
             const history = getHistory();
             // 避免重复添加相同密码
             const index = history.indexOf(password);
             if (index > -1) {
                 history.splice(index, 1);
             }
             history.unshift(password);
             // 只保留最近10条
             if (history.length > 10) {
                 history.pop();
             }
             localStorage.setItem('password_generator_history', JSON.stringify(history));
         }

         // 获取历史记录
         function getHistory() {
             try {
                 const data = localStorage.getItem('password_generator_history');
                 return data ? JSON.parse(data) : [];
             } catch (e) {
                 return [];
             }
         }

        // 当前分页
        let currentPage = 1;
        const pageSize = 5;

         // 渲染历史记录
         function renderHistory() {
             const history = getHistory();
             const container = document.getElementById('historyContainer');
             const listEl = document.getElementById('historyList');
             const paginationEl = document.getElementById('historyPagination');
             
             if (history.length === 0) {
                 container.style.display = 'none';
                 return;
             }
             
             container.style.display = 'block';
             listEl.innerHTML = '';

             // 分页计算
             const totalPages = Math.ceil(history.length / pageSize);
             if (currentPage > totalPages) currentPage = totalPages;
             const start = (currentPage - 1) * pageSize;
             const end = start + pageSize;
             const pageData = history.slice(start, end);
             
             // 渲染当前页数据
             pageData.forEach(pwd => {
                 const item = document.createElement('div');
                 item.className = 'history-item';

                 const passwordEl = document.createElement('span');
                 passwordEl.className = 'history-password';
                 passwordEl.textContent = pwd;
                 passwordEl.addEventListener('click', () => copyHistoryPassword(pwd));

                 const copyBtn = document.createElement('button');
                 copyBtn.className = 'btn-history-copy';
                 copyBtn.type = 'button';
                 copyBtn.textContent = '复制';
                 copyBtn.addEventListener('click', () => copyHistoryPassword(pwd));

                 item.appendChild(passwordEl);
                 item.appendChild(copyBtn);
                 listEl.appendChild(item);
             });

             // 渲染分页按钮
             paginationEl.innerHTML = '';
             
             // 上一页
             const prevBtn = document.createElement('button');
             prevBtn.className = 'page-btn';
             prevBtn.textContent = '←';
             prevBtn.disabled = currentPage <= 1;
             prevBtn.onclick = () => {
                 if (currentPage > 1) {
                     currentPage--;
                     renderHistory();
                 }
             };
             paginationEl.appendChild(prevBtn);

             // 页码
             for (let i = 1; i <= totalPages; i++) {
                 const pageBtn = document.createElement('button');
                 pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                 pageBtn.textContent = i;
                 pageBtn.onclick = () => {
                     currentPage = i;
                     renderHistory();
                 };
                 paginationEl.appendChild(pageBtn);
             }

             // 下一页
             const nextBtn = document.createElement('button');
             nextBtn.className = 'page-btn';
             nextBtn.textContent = '→';
             nextBtn.disabled = currentPage >= totalPages;
             nextBtn.onclick = () => {
                 if (currentPage < totalPages) {
                     currentPage++;
                     renderHistory();
                 }
             };
             paginationEl.appendChild(nextBtn);
         }

         // 复制历史密码
         function copyHistoryPassword(password) {
             document.getElementById('result').value = password;
             window.copyToClipboard(password, {
                 successMsg: '历史密码已复制 ✓',
                 errorMsg: '复制失败，请手动复制'
             });
         }

         function copyPasswordResult() {
            const password = document.getElementById('result').value;
            window.copyToClipboard(password, {
                successMsg: '密码已复制 ✓',
                errorMsg: '复制失败，请手动复制'
            });
        }

        // 模板定义
        const templates = {
            website: { len: 8, lower: true, upper: true, digit: true, symb: false, excludeAmbiguous: true },
            wifi: { len: 12, lower: false, upper: false, digit: true, symb: false, excludeAmbiguous: false },
            server: { len: 16, lower: true, upper: true, digit: true, symb: true, excludeAmbiguous: false },
            pin: { len: 6, lower: false, upper: false, digit: true, symb: false, excludeAmbiguous: false },
            userpass: { len: 12, lower: true, upper: true, digit: true, symb: false, excludeAmbiguous: true, generateUsername: true, usernameLen: 8 }
        };

        // 应用模板
        function applyTemplate(name) {
            const tpl = templates[name];
            document.getElementById('len').value = tpl.len;
            document.getElementById('incLower').checked = tpl.lower;
            document.getElementById('incUpper').checked = tpl.upper;
            document.getElementById('incDigit').checked = tpl.digit;
            document.getElementById('incSymb').checked = tpl.symb;
            document.getElementById('excludeAmbiguous').checked = !!tpl.excludeAmbiguous;
            if (tpl.customSymbs !== undefined) {
                document.getElementById('customSymbs').value = tpl.customSymbs;
            }
            if (tpl.generateUsername !== undefined) {
                document.getElementById('generateUsername').checked = tpl.generateUsername;
            }
            if (tpl.usernameLen !== undefined) {
                document.getElementById('usernameLen').value = tpl.usernameLen;
            }
        }
        document.getElementById('len').addEventListener('change', generate);
        document.getElementById('count').addEventListener('change', generate);
        // 生成用户名
        function generateUsernameString(length, caseStyle) {
            const consonants = 'bcdfghjklmnpqrstvwxyz';
            const vowels = 'aeiou';
            let username = '';
            
            // 使用辅音+元音的模式，更容易读
            for (let i = 0; i < length; i += 2) {
                username += consonants[Math.floor(Math.random() * consonants.length)];
                if (i + 1 < length) {
                    username += vowels[Math.floor(Math.random() * vowels.length)];
                }
            }
            
            // 根据格式调整大小写
            switch (caseStyle) {
                case 'pascal':
                    username = username.charAt(0).toUpperCase() + username.slice(1);
                    break;
                case 'camel':
                    username = username.charAt(0).toLowerCase() + username.slice(1);
                    break;
                case 'lower':
                default:
                    username = username.toLowerCase();
                    break;
            }
            
            return username;
        }

        // 复制用户名
        function copyUsername() {
            const username = document.getElementById('usernameOutput').textContent;
            window.copyToClipboard(username, {
                successMsg: '用户名已复制 ✓',
                errorMsg: '复制失败，请手动复制'
            });
        }

        // 复制全部（用户名+密码）
        function copyAll() {
            const generateUsername = document.getElementById('generateUsername').checked;
            const username = document.getElementById('usernameOutput').textContent;
            const password = document.getElementById('result').value;
            let text = '';
            if (generateUsername && username) {
                text += `用户名: ${username}\n密码: ${password}`;
            } else {
                text = password;
            }
            window.copyToClipboard(text, {
                successMsg: '全部内容已复制 ✓',
                errorMsg: '复制失败，请手动复制'
            });
        }

        // 清空所有
        function clearAll() {
            document.getElementById('result').value = '';
            document.getElementById('usernameOutput').textContent = '';
        }

        // 清空历史记录
        function clearHistory() {
            localStorage.removeItem('password_generator_history');
            currentPage = 1;
            renderHistory();
        }

         document.getElementById('customSymbs').addEventListener('input', generate);
         document.getElementById('incLower').addEventListener('change', generate);
         document.getElementById('incUpper').addEventListener('change', generate);
         document.getElementById('incDigit').addEventListener('change', generate);
         document.getElementById('incSymb').addEventListener('change', generate);
         document.getElementById('excludeAmbiguous').addEventListener('change', generate);
         document.getElementById('generateUsername').addEventListener('change', generate);
         document.getElementById('usernameLen').addEventListener('change', generate);
         document.getElementById('usernameCase').addEventListener('change', generate);
         renderHistory();
         generate();
    </script>
