<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML 校正预览器</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css">
<style>
  body{background:linear-gradient(135deg,#0f172a,#334155);min-height:100vh}
  .card{background:rgba(255,255,255,.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1)}
  textarea{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;resize:vertical}
  .yaml-view pre{white-space:pre-wrap;word-break:break-word;font-size:.9rem}
  .badge{font-size:.7rem;opacity:.85}
</style>
</head>
<body class="p-4">
<div class="max-w-5xl mx-auto">
  <h1 class="text-2xl font-bold mb-2 text-white">YAML 校正预览器</h1>
  <p class="text-gray-300 mb-6">纯前端解析与格式化，不依赖外部库，安全隐私</p>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
    <div class="card rounded-xl p-4 shadow-2xl">
      <h2 class="text-lg font-semibold mb-2">输入 YAML</h2>
      <textarea id="input" placeholder="在此粘贴或键入 YAML...&#10;示例:&#10;name: Alice&#10;age: 30&#10;tags: [a, b]" class="w-full h-64 rounded bg-white/5 border-white/20 text-white p-3 focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 resize-none"></textarea>
      <div class="flex gap-3 mt-3">
        <button onclick="formatYAML()" class="bg-blue-600 hover:bg-blue-500 text-white rounded px-4 py-2 font-medium">格式化</button>
        <button onclick="validateYAML()" class="bg-emerald-600 hover:bg-emerald-500 text-white rounded px-4 py-2 font-medium">验证</button>
        <button onclick="clearAll()" class="bg-gray-600 hover:bg-gray-500 text-white rounded px-4 py-2 font-medium">清空</button>
      </div>
      <div id="inputError" class="mt-3 text-xs text-red-400 hidden"></div>
    </div>
    <div class="card rounded-xl p-4 shadow-2xl">
      <h2 class="text-lg font-semibold mb-2">格式化结果</h2>
      <div class="yaml-view bg-white/5 rounded-lg p-3 h-96 overflow-auto border border-white/10">
        <pre id="output" class="text-white">尚未格式化...</pre>
      </div>
      <div class="flex justify-between items-center mt-3">
        <span class="badge text-gray-400" id="yamlStats">-</span>
        <div class="flex gap-2">
          <button onclick="copyText('output')" class="bg-white/10 hover:bg-white/20 text-white rounded px-3 py-1 text-xs">复制</button>
          <button onclick="downloadFile('output','yaml')" class="bg-white/10 hover:bg-white/20 text-white rounded px-3 py-1 text-xs">下载</button>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-6 card rounded-xl p-4 shadow-2xl">
    <h2 class="text-lg font-semibold mb-2">使用说明</h2>
    <ul class="text-sm text-gray-300 list-disc list-inside space-y-1">
      <li>纯前端解析，浏览器本地完成，不上传数据。</li>
      <li>支持常见映射、序列、标量与简单嵌套。</li>
      <li>无法处理多文档流、复杂锚点/别名或特殊标签。</li>
      <li>验证会给出错误行与简单修正建议。</li>
    </ul>
  </div>
</div>
</body>
</html>
