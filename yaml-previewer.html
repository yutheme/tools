<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML 预览/验证/格式化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --primary: #165DFF;
            --primary-light: rgba(22, 93, 255, 0.1);
            --secondary: #36CFC9;
            --neutral: #F5F7FA;
            --dark: #1D2129;
            --gray-100: #F5F7FA;
            --gray-200: #E5E7EB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --danger: #F53F3F;
            --success: #00B42A;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--gray-100) 0%, white 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            background: white;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            overflow: hidden;
            transition: var(--transition);
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header h1 i {
            margin-right: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0E4FD9;
            transform: translateY(-1px);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #D93636;
            transform: translateY(-1px);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .editor-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .editor-box label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--dark);
            display: flex;
            align-items: center;
        }

        .editor-box label i {
            color: var(--primary);
            width: 1rem;
            text-align: center;
            margin-right: 0.5rem;
        }

        textarea {
            width: 100%;
            height: 500px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: vertical;
            transition: var(--transition);
            outline: none;
            background: var(--gray-100);
            line-height: 1.6;
            tab-size: 2;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
            background: white;
        }

        .error-box {
            background: rgba(245, 63, 63, 0.1);
            color: var(--danger);
            padding: 1rem;
            border-radius: 8px;
            line-height: 1.8;
            border-left: 4px solid var(--danger);
        }

        .success-box {
            background: rgba(0, 180, 42, 0.1);
            color: var(--success);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--success);
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0;
            border-top: 1px solid var(--gray-200);
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            textarea {
                height: 300px;
            }
            .btn {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-file-code"></i>YAML 工具</h1>
            <p>在线验证、格式化、预览YAML内容，本地处理无需上传</p>
        </div>

        <div class="content">
            <div class="toolbar">
                <button onclick="formatYaml()" class="btn btn-primary">
                    <i class="fas fa-indent"></i>格式化 YAML
                </button>
                <button onclick="validateYaml()" class="btn btn-primary">
                    <i class="fas fa-check-circle"></i>验证 YAML
                </button>
                <button onclick="autoFixIndent()" class="btn btn-primary">
                    <i class="fas fa-wrench"></i>自动修复缩进
                </button>
                <button onclick="copyResult()" class="btn btn-primary">
                    <i class="fas fa-clipboard"></i>复制结果
                </button>
                <button onclick="clearAll()" class="btn btn-danger">
                    <i class="fas fa-trash"></i>清空内容
                </button>
            </div>

            <div id="errorBox" class="error-box" style="display: none;"></div>
            <div id="successBox" class="success-box" style="display: none;"></div>

            <div class="editor-container">
                <div class="editor-box">
                    <label><i class="fas fa-pen"></i>输入 YAML</label>
                    <textarea id="inputArea" placeholder="请在此输入YAML内容..."></textarea>
                </div>
                <div class="editor-box">
                    <label><i class="fas fa-eye"></i>输出结果</label>
                    <textarea id="outputArea" readonly placeholder="格式化/验证结果将显示在这里..."></textarea>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 工具集合 | 所有工具仅供学习使用</p>
        </footer>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');

        function hideMessages() {
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
        }

        function showError(msg, extraTip = '') {
            let fullMsg = msg;
            if (extraTip) {
                fullMsg += `<br><br>💡 建议：${extraTip}`;
            }
            errorBox.innerHTML = fullMsg;
            errorBox.style.display = 'block';
            successBox.style.display = 'none';
        }

        function showSuccess(msg) {
            successBox.textContent = msg;
            successBox.style.display = 'block';
            errorBox.style.display = 'none';
        }

        function autoFixIndent() {
            hideMessages();
            let content = inputArea.value;
            content = content.replace(/\t/g, '  ');
            content = content.replace(/^(\s*)-\s+/gm, '$1  - ');
            inputArea.value = content;
            showSuccess('✅ 已自动替换制表符为空格，尝试修复缩进');
        }

        function validateYaml() {
            hideMessages();
            const content = inputArea.value.trim();
            if (!content) {
                showError('请输入YAML内容');
                return false;
            }
            try {
                const parsed = jsyaml.load(content, {
                    strict: false,
                    schema: jsyaml.DEFAULT_SCHEMA,
                    allowDuplicate: false
                });
                showSuccess('✅ YAML 格式验证通过');
                return parsed;
            } catch (e) {
                let extraTip = '';
                if (e.message.includes('indentation')) {
                    extraTip = '检查是否混用了制表符和空格，列表项建议比上级键多缩进2个空格，可点击「自动修复缩进」尝试修复';
                } else if (e.message.includes('duplicate')) {
                    extraTip = 'YAML中不允许重复的键，请检查是否有重复定义的字段';
                } else if (e.message.includes('mapping')) {
                    extraTip = '键值对格式错误，检查冒号后面是否有空格，缩进是否正确';
                }
                showError(`❌ 验证失败: ${e.message}`, extraTip);
                return false;
            }
        }

        function formatYaml() {
            hideMessages();
            const parsed = validateYaml();
            if (!parsed) return;
            try {
                const formatted = jsyaml.dump(parsed, {
                    indent: 2,
                    lineWidth: 120,
                    noRefs: true,
                    sortKeys: false
                });
                outputArea.value = formatted;
                showSuccess('✅ YAML 格式化完成');
            } catch (e) {
                showError(`❌ 格式化失败: ${e.message}`);
            }
        }

        function copyResult() {
            const content = outputArea.value.trim();
            if (!content) {
                showError('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(content).then(() => {
                showSuccess('✅ 已复制到剪贴板');
            }).catch(() => {
                    showError('❌ 复制失败，请手动复制');
                });
        }

        function clearAll() {
            inputArea.value = '';
            outputArea.value = '';
            hideMessages();
        }

        inputArea.addEventListener('input', hideMessages);
    </script>
</body>
</html>
