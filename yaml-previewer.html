<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML 预览/验证/格式化工具</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        header h1 {
            font-size: 2rem;
            color: #2d3748;
            margin-bottom: 10px;
        }
        header p {
            color: #718096;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            background: #3182ce;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2b6cb0;
        }
        button.danger {
            background: #e53e3e;
        }
        button.danger:hover {
            background: #c53030;
        }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .editor-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .editor-box h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #2d3748;
        }
        textarea {
            width: 100%;
            height: 500px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
        }
        .error-box {
            background: #fff5f5;
            color: #c53030;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        .success-box {
            background: #f0fff4;
            color: #2f855a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px 0;
            border-top: 1px solid #e0e0e0;
            color: #718096;
            font-size: 14px;
        }
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YAML 工具</h1>
            <p>在线验证、格式化、预览YAML内容</p>
        </header>

        <div class="toolbar">
            <button onclick="formatYaml()">格式化 YAML</button>
            <button onclick="validateYaml()">验证 YAML</button>
            <button onclick="copyResult()">复制结果</button>
            <button onclick="clearAll()" class="danger">清空内容</button>
        </div>

        <div id="errorBox" class="error-box"></div>
        <div id="successBox" class="success-box"></div>

        <div class="editor-container">
            <div class="editor-box">
                <h3>输入 YAML</h3>
                <textarea id="inputArea" placeholder="请在此输入YAML内容..."></textarea>
            </div>
            <div class="editor-box">
                <h3>输出结果</h3>
                <textarea id="outputArea" readonly placeholder="格式化/验证结果将显示在这里..."></textarea>
            </div>
        </div>

        <footer>
            <p>© 2026 工具集合 | 所有工具仅供学习使用</p>
        </footer>
    </div>

    <script>
        const inputArea = document.getElementById('inputArea');
        const outputArea = document.getElementById('outputArea');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');

        function hideMessages() {
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            successBox.style.display = 'none';
        }

        function showSuccess(msg) {
            successBox.textContent = msg;
            successBox.style.display = 'block';
            errorBox.style.display = 'none';
        }

        function validateYaml() {
            hideMessages();
            const content = inputArea.value.trim();
            if (!content) {
                showError('请输入YAML内容');
                return false;
            }
            try {
                const parsed = jsyaml.load(content);
                showSuccess('✅ YAML 格式验证通过');
                return parsed;
            } catch (e) {
                showError(`❌ 验证失败: ${e.message}`);
                return false;
            }
        }

        function formatYaml() {
            hideMessages();
            const parsed = validateYaml();
            if (!parsed) return;
            try {
                const formatted = jsyaml.dump(parsed, {
                    indent: 2,
                    lineWidth: 120,
                    noRefs: true
                });
                outputArea.value = formatted;
                showSuccess('✅ YAML 格式化完成');
            } catch (e) {
                showError(`❌ 格式化失败: ${e.message}`);
            }
        }

        function copyResult() {
            const content = outputArea.value.trim();
            if (!content) {
                showError('没有可复制的内容');
                return;
            }
            navigator.clipboard.writeText(content).then(() => {
                showSuccess('✅ 已复制到剪贴板');
            }).catch(() => {
                    showError('❌ 复制失败，请手动复制');
                });
        }

        function clearAll() {
            inputArea.value = '';
            outputArea.value = '';
            hideMessages();
        }

        inputArea.addEventListener('input', hideMessages);
    </script>
</body>
</html>
