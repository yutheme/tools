<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-title" content="实用工具集">
    <meta name="description" content="实用工具集提供数字大写转换、字数统计、智能翻译、密码生成器、YAML工具等多种在线工具，简洁高效，满足日常办公与开发需求">
    <meta name="keywords" content="实用工具,数字大写转换,字数统计,智能翻译,密码生成器,YAML格式化,YAML对比,在线工具,开发工具,办公工具">
    <title>实用工具集 - 高效的在线工具解决方案</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- 主题闪烁防护 -->
    <script>
        (function(){
            var t=localStorage.getItem('theme');
            if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            document.documentElement.setAttribute('data-theme',t);
        })();
    </script>

    <!-- CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- 共享 CSS -->
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/loading.css">
    <script src="js/utils/click-tracker.js"></script>

    <style>
        /* ========== 首页特有样式 ========== */
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--color-primary-light) 0%, rgba(54, 207, 201, 0.05) 100%);
        }

        .page-content {
            padding: 1.5rem 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* 标题样式 */
        .page-title {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 1rem;
        }

        .page-title h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: bold;
            color: var(--color-gray-700);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title p {
            color: var(--color-gray-500);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* 网格布局 */
        .tools-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            grid-auto-rows: 1fr;
        }

        @media (min-width: 640px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .tools-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (min-width: 1280px) {
            .tools-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 1.25rem;
            }
        }

        /* 卡片样式 */
        .tool-card {
            background: linear-gradient(180deg, var(--color-white) 0%, var(--color-gray-50) 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-gray-200);
            overflow: hidden;
            cursor: pointer;
            transform: translateY(0);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 1;
            box-shadow: var(--shadow-card);
        }

        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .tool-card-content {
            padding: 1.25rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .tool-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
            transition: all var(--transition-normal);
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
        }

        .tool-icon i {
            font-size: 1.25rem !important;
        }

        .tool-card h2 {
            font-size: 1.1rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-gray-700);
            margin-bottom: 0.5rem;
            height: auto;
            line-height: 1.4;
        }

        .tool-description {
            color: var(--color-gray-500);
            margin-bottom: 1rem;
            line-height: 1.5;
            font-size: 0.875rem;
            height: auto;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .tool-action-container {
            margin-top: auto;
        }

        .tool-action {
            display: inline-flex;
            align-items: center;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .tool-action i {
            margin-left: 0.5rem;
            transition: transform 0.3s ease;
        }

        .tool-card-footer {
            padding: 0.625rem 1rem;
            background-color: var(--color-gray-50);
            border-top: 1px solid var(--color-gray-200);
            font-size: 0.75rem;
            color: var(--color-gray-500);
            height: auto;
            display: flex;
            align-items: center;
        }

        .tool-card-footer i {
            color: var(--color-secondary);
            margin-right: 0.25rem;
        }

        .card-link {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            text-decoration: none;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            color: var(--color-gray-500);
            font-size: 0.875rem;
        }

        /* 工具特定颜色 */
        .tool-number .tool-icon { background-color: var(--color-tool-number-light); }
        .tool-number .tool-action { color: var(--color-tool-number); }
        .tool-number:hover .tool-icon { background-color: var(--color-tool-number-ring); }
        .tool-number .tool-icon i { color: var(--color-tool-number); }

        .tool-wordcount .tool-icon { background-color: var(--color-tool-wordcount-light); }
        .tool-wordcount .tool-action { color: var(--color-tool-wordcount); }
        .tool-wordcount:hover .tool-icon { background-color: var(--color-tool-wordcount-ring); }
        .tool-wordcount .tool-icon i { color: var(--color-tool-wordcount); }

        .tool-translate .tool-icon { background-color: var(--color-tool-translate-light); }
        .tool-translate .tool-action { color: var(--color-tool-translate); }
        .tool-translate:hover .tool-icon { background-color: var(--color-tool-translate-ring); }
        .tool-translate .tool-icon i { color: var(--color-tool-translate); }

        .tool-password .tool-icon { background-color: var(--color-tool-password-light); }
        .tool-password .tool-action { color: var(--color-tool-password); }
        .tool-password:hover .tool-icon { background-color: var(--color-tool-password-ring); }
        .tool-password .tool-icon i { color: var(--color-tool-password); }

        .tool-yaml .tool-icon { background-color: var(--color-tool-yaml-light); }
        .tool-yaml .tool-action { color: var(--color-tool-yaml); }
        .tool-yaml:hover .tool-icon { background-color: var(--color-tool-yaml-ring); }
        .tool-yaml .tool-icon i { color: var(--color-tool-yaml); }

        .tool-clipboard .tool-icon { background-color: var(--color-tool-clipboard-light); }
        .tool-clipboard .tool-action { color: var(--color-tool-clipboard); }
        .tool-clipboard:hover .tool-icon { background-color: var(--color-tool-clipboard-ring); }
        .tool-clipboard .tool-icon i { color: var(--color-tool-clipboard); }

        .tool-key .tool-icon { background-color: var(--color-tool-key-light); }
        .tool-key .tool-action { color: var(--color-tool-key); }
        .tool-key:hover .tool-icon { background-color: var(--color-tool-key-ring); }
        .tool-key .tool-icon i { color: var(--color-tool-key); }

        .tool-vrime .tool-icon { background-color: var(--color-tool-vrime-light); }
        .tool-vrime .tool-action { color: var(--color-tool-vrime); }
        .tool-vrime:hover .tool-icon { background-color: var(--color-tool-vrime-ring); }
        .tool-vrime .tool-icon i { color: var(--color-tool-vrime); }

        .tool-docker .tool-icon { background-color: var(--color-tool-docker-light); }
        .tool-docker .tool-action { color: var(--color-tool-docker); }
        .tool-docker:hover .tool-icon { background-color: var(--color-tool-docker-ring); }
        .tool-docker .tool-icon i { color: var(--color-tool-docker); }

        .tool-card:hover .tool-action i {
            transform: translateX(6px);
        }

        /* 入场动画 */
        .card-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .card-enter-active {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        /* 深色模式适配 */
        [data-theme="dark"] .tool-card {
            background: linear-gradient(180deg, var(--color-white) 0%, var(--color-gray-100) 100%);
        }

        [data-theme="dark"] .tool-card-footer {
            background-color: var(--color-gray-100);
        }

        [data-theme="dark"] body,
        [data-theme="dark"] .page-content {
            background: linear-gradient(135deg, var(--color-gray-100) 0%, var(--color-gray-50) 100%);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) .tool-card {
                background: linear-gradient(180deg, var(--color-white) 0%, var(--color-gray-100) 100%);
            }

            :root:not([data-theme="light"]) .tool-card-footer {
                background-color: var(--color-gray-100);
            }

            :root:not([data-theme="light"]) body,
            :root:not([data-theme="light"]) .page-content {
                background: linear-gradient(135deg, var(--color-gray-100) 0%, var(--color-gray-50) 100%);
            }
        }
    </style>
</head>
<body>
    <div class="page-content">
    <div class="container">
        <header class="page-title">
            <h1>
                <i class="fas fa-wrench" style="color: var(--color-tool-number); margin-right: 0.75rem;"></i>实用工具集
            </h1>
            <p>
                精选高效工具，满足日常办公与学习需求，简洁易用，功能强大
            </p>
        </header>

        <div class="tools-grid" id="tools-grid"></div>

        <footer>
            <p>© 2026 实用工具集 | 简洁高效的在线工具解决方案</p>
        </footer>
    </div>
    </div>

    <script src="js/utils/toast.js"></script>
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/copy.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/loading.js"></script>
    <script src="js/components/navbar.js"></script>

    <script>
        // 工具配置数据
        const TOOLS_CONFIG = [
            { id: 'number-converter', name: '数字大写转换', url: 'number-converter.html', icon: 'fa-right-left', category: 'number', description: '快速将阿拉伯数字或中文数字转换为符合财务规范的大写金额格式，支持大额数字和小数。', feature: '符合财务规范格式' },
            { id: 'word-count', name: '字数统计工具', url: 'word-count.html', icon: 'fa-file-lines', category: 'wordcount', description: '精准统计文本中的汉字、数字、字母等字符数量，支持多种文件格式上传分析。', feature: '支持多格式文件分析' },
            { id: 'translator', name: '智能翻译工具', url: 'translator.html', icon: 'fa-language', category: 'translate', description: '自动识别语言类型，支持多语言互译，实时响应，操作简单，满足跨语言沟通需求。', feature: '自动语言检测' },
            { id: 'password-generator', name: '密码生成器', url: 'password-generator.html', icon: 'fa-lock', category: 'password', description: '本地生成高强度账号密码，支持同时生成用户名 + 密码、排除易混淆字符、密码强度可视化、常用模板、批量生成。', feature: '隐私安全 · 前端生成' },
            { id: 'yaml-previewer', name: 'YAML 工具', url: 'yaml-previewer.html', icon: 'fa-file-lines', category: 'yaml', description: 'YAML 格式化验证一站式工具，支持 YAML⇔JSON 双向转换、保留注释、差异对比。', feature: '双向转换 · 差异对比' },
            { id: 'clipboard-history', name: '剪贴板历史', url: 'clipboard-history.html', icon: 'fa-clipboard', category: 'clipboard', description: '记录复制粘贴历史，一键找回之前复制的内容，支持搜索和快速复用。', feature: '本地存储 · 安全隐私' },
            { id: 'key-generator', name: '密钥生成器', url: 'key-generator.html', icon: 'fa-key', category: 'key', description: '生成 API Key、UUID、Base62、十六进制等多种格式密钥，支持自定义前缀和批量生成，完全本地运行。', feature: '本地生成 · 支持多种格式' },
            { id: 'vrime', name: '在线中文输入法', url: 'vrime.html', icon: 'fa-keyboard', category: 'vrime', description: '基于 RIME 的网页中文输入法，适合 Meta Quest VR 浏览器使用，支持拼音、五笔、双拼，完全本地运行。', feature: '本地 WASM · VR 友好' },
            { id: 'docker-converter', name: 'Docker 转换器', url: 'docker-converter.html', icon: 'fa-docker', category: 'docker', description: '将 docker run 命令一键转换为 docker-compose.yml 格式，支持端口映射、卷挂载、环境变量等常用参数。', feature: '快速转换 · 支持高级参数' }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('tools-grid');
            
            // 按点击量排序
            const sortedTools = ClickTracker.sortByClicks(TOOLS_CONFIG);
            
            // 渲染卡片
            sortedTools.forEach((tool, index) => {
                const card = createToolCard(tool, index);
                grid.appendChild(card);
            });
            
            // 绑定点击事件（追踪点击）
            document.querySelectorAll('.tool-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const url = this.dataset.url;
                    if (url) ClickTracker.increment(url);
                });
            });
        });
        
        function createToolCard(tool, index) {
            const card = document.createElement('div');
            card.className = `tool-card tool-${tool.category}`;
            card.dataset.url = tool.url;
            card.style.transitionDelay = `${200 * index}ms`;
            
            card.innerHTML = `
                <a href="${tool.url}" class="card-link">
                    <div class="tool-card-content">
                        <div class="tool-icon"><i class="fas ${tool.icon}"></i></div>
                        <h2>${tool.name}</h2>
                        <div class="tool-description">${tool.description}</div>
                        <div class="tool-action-container">
                            <div class="tool-action">立即使用<i class="fas fa-arrow-right"></i></div>
                        </div>
                    </div>
                    <div class="tool-card-footer"><i class="fas fa-circle-check"></i>${tool.feature}</div>
                </a>
            `;
            
            // 入场动画
            card.classList.add('card-enter');
            setTimeout(() => card.classList.add('card-enter-active'), 200 * index);
            
            return card;
        }

        // 调试工具：重置点击数据
        window.resetClicks = () => {
            ClickTracker.reset();
            location.reload();
        };
    </script>
</body>
</html>
