<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥生成器 - API Key / UUID 生成工具</title>
    <link rel="icon" type="image/png" sizes="96x96" href="icons/key-96x96.png">
    <link rel="shortcut icon" href="icons/key-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/key-apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- 主题闪烁防护 -->
    <script>
        (function(){
            var t=localStorage.getItem('theme');
            if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            document.documentElement.setAttribute('data-theme',t);
        })();
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/loading.css">

    <style>
        :root {
            --color-primary: var(--color-tool-key);
            --color-primary-dark: var(--color-tool-key-dark);
            --color-primary-light: var(--color-tool-key-light);
            --color-primary-ring: var(--color-tool-key-ring);
            --color-success: #10B981;
            --color-danger: #EF4444;
        }

        body {
            background-color: var(--color-gray-50);
            color: var(--color-gray-700);
            min-height: 100vh;
        }

        .page-content {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .header {
            background: var(--color-primary);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header h1 i {
            margin-right: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        @media (min-width: 768px) {
            .content {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1.5rem;
            }
            .full-width {
                grid-column: 1 / -1;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-gray-700);
            display: flex;
            align-items: center;
        }

        .form-group label i {
            color: var(--color-primary);
            width: 1rem;
            text-align: center;
            margin-right: 0.5rem;
        }

        .key-type-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .key-type-btn {
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-200);
            background: var(--color-white);
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .key-type-btn i {
            font-size: 1.25rem;
            color: var(--color-gray-400);
        }

        .key-type-btn:hover {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
        }

        .key-type-btn.active {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
        }

        .key-type-btn.active i {
            color: var(--color-primary);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .checkbox-item input[type="checkbox"] {
            accent-color: var(--color-primary);
        }

        input[type="number"],
        input[type="text"],
        select {
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-ring);
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-dark);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: var(--color-gray-200);
            color: var(--color-gray-700);
        }

        .btn-secondary:hover {
            background-color: var(--color-gray-300);
            transform: translateY(-1px);
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
        }

        .result-container {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: var(--font-family-mono);
            resize: vertical;
            transition: all 0.3s ease;
            outline: none;
            background: var(--color-gray-100);
            color: var(--color-gray-700);
        }

        textarea:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-ring);
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background-color: var(--color-primary-dark);
        }

        .prefix-input {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .prefix-tag {
            background: var(--color-primary-light);
            color: var(--color-primary-dark);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
        }

        .key-history-container {
            margin-top: 0.5rem;
        }

        .key-history-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-top: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .key-history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.75rem;
            background: var(--color-gray-100);
            border-radius: var(--radius-sm);
            font-family: var(--font-family-mono);
            font-size: 0.8rem;
        }

        .key-history-key {
            color: var(--color-gray-700);
            cursor: pointer;
            flex: 1;
            margin-right: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .key-history-key:hover {
            color: var(--color-primary);
        }

        .key-type-badge {
            font-size: 0.65rem;
            padding: 0.15rem 0.4rem;
            background: var(--color-primary-light);
            color: var(--color-primary);
            border-radius: 4px;
            margin-right: 0.5rem;
        }

       .key-btn-history-copy {
           padding: 0.25rem 0.5rem;
           font-size: 0.7rem;
           border: none;
           background: var(--color-primary);
           color: white;
           border-radius: 4px;
           cursor: pointer;
       }

        .info-box {
            padding: 0.75rem;
            background: var(--color-primary-light);
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            color: var(--color-primary-dark);
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .info-box i {
            margin-top: 0.1rem;
        }

        @media (max-width: 480px) {
            .page-content {
                padding: 0.5rem;
            }

            .key-type-group {
                grid-template-columns: 1fr;
            }
            .checkbox-group {
                grid-template-columns: 1fr;
            }
            .input-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* 深色模式 */
        [data-theme="dark"] input[type="number"],
        [data-theme="dark"] input[type="text"],
        [data-theme="dark"] select {
            background: var(--color-gray-100);
            border-color: var(--color-gray-200);
            color: var(--color-gray-700);
        }

        [data-theme="dark"] textarea {
            background: var(--color-gray-100);
            border-color: var(--color-gray-200);
            color: var(--color-gray-700);
        }

        [data-theme="dark"] .key-type-btn {
            background: var(--color-gray-200);
            border-color: var(--color-gray-300);
        }

        [data-theme="dark"] .key-type-btn.active {
            background: var(--color-primary-light);
        }



        [data-theme="dark"] .key-history-item {
            background: var(--color-gray-200);
        }

        [data-theme="dark"] .key-history-key {
            color: var(--color-gray-500);
        }

        [data-theme="dark"] .info-box {
            background: rgba(249, 115, 22, 0.1);
        }
    </style>
</head>
<body>
    <div class="page-content">
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-key"></i>密钥生成器</h1>
            <p>前端本地生成，不会上传，支持多种密钥格式</p>
        </div>

        <div class="content">
            <div class="form-group full-width">
                <label><i class="fas fa-list-ul"></i>密钥类型</label>
                <div class="key-type-group">
                    <button class="key-type-btn active" data-type="api" onclick="setKeyType('api')">
                        <i class="fas fa-server"></i>
                        <span>API Key</span>
                    </button>
                    <button class="key-type-btn" data-type="uuid" onclick="setKeyType('uuid')">
                        <i class="fas fa-fingerprint"></i>
                        <span>UUID v4</span>
                    </button>
                    <button class="key-type-btn" data-type="base62" onclick="setKeyType('base62')">
                        <i class="fas fa-code"></i>
                        <span>Base62</span>
                    </button>
                    <button class="key-type-btn" data-type="hex" onclick="setKeyType('hex')">
                        <i class="fas fa-hashtag"></i>
                        <span>十六进制</span>
                    </button>
                    <button class="key-type-btn" data-type="jwt" onclick="setKeyType('jwt')">
                        <i class="fas fa-shield-alt"></i>
                        <span>JWT Secret</span>
                    </button>
                    <button class="key-type-btn" data-type="custom" onclick="setKeyType('custom')">
                        <i class="fas fa-sliders-h"></i>
                        <span>自定义格式</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-ruler-horizontal"></i>密钥长度</label>
                <input type="number" id="keyLength" min="8" max="512" value="32" onchange="generate()">
            </div>

            <div class="form-group">
                <label><i class="fas fa-sort-numeric-up"></i>生成数量</label>
                <input type="number" id="keyCount" min="1" max="50" value="1" onchange="generate()">
            </div>

            <div class="form-group" id="prefixGroup">
                <label><i class="fas fa-tag"></i>前缀</label>
                <div class="prefix-input">
                    <span class="prefix-tag">sk_</span>
                    <input type="text" id="keyPrefix" placeholder="例如: sk_" value="" oninput="generate()">
                </div>
            </div>

            <div class="form-group full-width" id="customOptions" style="display: none;">
                <label><i class="fas fa-check-square"></i>字符集选项</label>
                <div class="checkbox-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="incLower" checked onchange="generate()">小写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incUpper" checked onchange="generate()">大写字母
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incDigit" checked onchange="generate()">数字
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="incSymb" onchange="generate()">特殊符号
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="excludeAmbiguous" checked onchange="generate()">排除易混淆字符
                    </label>
                </div>
            </div>

            <div class="form-group full-width">
                <div class="input-group">
                    <button onclick="generate()" class="btn btn-primary" style="flex: 1;">
                        <i class="fas fa-magic"></i>生成密钥
                    </button>
                    <button onclick="clearAll()" class="btn btn-secondary">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <div class="form-group full-width">
                <label><i class="fas fa-clipboard-list"></i>生成结果</label>
                <div class="result-container">
                    <textarea id="result" readonly placeholder="生成的密钥将显示在这里"></textarea>
                    <button onclick="copyKeyResult(this)" class="copy-btn">
                        <i class="fas fa-clipboard"></i>复制
                    </button>
                </div>
               <div class="key-history-container" id="keyHistoryContainer" style="display: none;">
                   <label style="font-size: 0.8rem; color: var(--color-gray-400); display: flex; justify-content: space-between; align-items: center;">
                       最近生成记录（最多20条）
                       <button onclick="clearHistory()" class="btn btn-sm btn-secondary">清空</button>
                   </label>
                   <div class="key-history-list" id="keyHistoryList"></div>
               </div>
            </div>

            <div class="form-group full-width">
                <div class="info-box">
                    <i class="fas fa-info-circle"></i>
                    <div>
                        <strong>提示：</strong>
                        <span id="typeDescription">API Key 格式：适用于大多数 REST API 接口认证，32 位 Base62 编码字符串。</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- 共享 JS -->
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/copy.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/loading.js"></script>

    <script>
        var currentKeyType = 'api';
        var descriptions = {
            api: 'API Key 格式：适用于大多数 REST API 接口认证，Base62 编码字符串。',
            uuid: 'UUID v4 格式：标准的 128 位唯一标识符，格式为 8-4-4-4-12。',
            base62: 'Base62 编码：仅包含大小写字母和数字，适合 URL 和文件名。',
            hex: '十六进制格式：仅包含 0-9 和 a-f，常用于加密密钥。',
            jwt: 'JWT Secret：推荐 64 位以上的高强度随机密钥，用于 HS256/HS512 签名。',
            custom: '自定义格式：根据您选择的字符集生成个性化密钥。'
        };

        var charSets = {
            lower: 'abcdefghijklmnopqrstuvwxyz',
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            digit: '0123456789',
            symb: '-_.~'
        };

        var ambiguousChars = new Set(['0', 'O', 'o', '1', 'l', 'I', '2', 'Z', '5', 'S']);

        function setKeyType(type) {
            currentKeyType = type;
            document.querySelectorAll('.key-type-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.type === type);
            });
            document.getElementById('typeDescription').textContent = descriptions[type];

            var customOptions = document.getElementById('customOptions');
            customOptions.style.display = type === 'custom' ? 'block' : 'none';

            var prefixGroup = document.getElementById('prefixGroup');
            prefixGroup.style.display = type === 'uuid' ? 'none' : 'block';

            if (type === 'jwt') {
                document.getElementById('keyLength').value = 64;
            } else if (type === 'uuid') {
                document.getElementById('keyLength').value = 36;
            }

            generate();
        }

        function generateUUID() {
            var randomValues = new Uint8Array(16);
            crypto.getRandomValues(randomValues);

            randomValues[6] = (randomValues[6] & 0x0f) | 0x40;
            randomValues[8] = (randomValues[8] & 0x3f) | 0x80;

            var hex = Array.from(randomValues, function(b) { return b.toString(16).padStart(2, '0'); }).join('');
            return hex.slice(0, 8) + '-' + hex.slice(8, 12) + '-' + hex.slice(12, 16) + '-' + hex.slice(16, 20) + '-' + hex.slice(20, 32);
        }

        function generateBase62(length) {
            var chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            var result = '';
            var randomValues = new Uint8Array(length);
            crypto.getRandomValues(randomValues);
            for (var i = 0; i < length; i++) {
                result += chars[randomValues[i] % 62];
            }
            return result;
        }

        function generateHex(length) {
            var randomValues = new Uint8Array(Math.ceil(length / 2));
            crypto.getRandomValues(randomValues);
            return Array.from(randomValues, function(b) { return b.toString(16).padStart(2, '0'); }).join('').slice(0, length);
        }

        function generateCustom(length) {
            var pool = '';
            var incLower = document.getElementById('incLower').checked;
            var incUpper = document.getElementById('incUpper').checked;
            var incDigit = document.getElementById('incDigit').checked;
            var incSymb = document.getElementById('incSymb').checked;
            var excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;

            if (incLower) pool += charSets.lower;
            if (incUpper) pool += charSets.upper;
            if (incDigit) pool += charSets.digit;
            if (incSymb) pool += charSets.symb;

            if (excludeAmbiguous) {
                pool = Array.from(pool).filter(function(c) { return !ambiguousChars.has(c); }).join('');
            }

            if (!pool) return '请至少选择一种字符集';

            var result = '';
            var randomValues = new Uint8Array(length);
            crypto.getRandomValues(randomValues);
            for (var i = 0; i < length; i++) {
                result += pool[randomValues[i] % pool.length];
            }
            return result;
        }

        function generate() {
            var length = Math.max(8, Math.min(512, parseInt(document.getElementById('keyLength').value || '32', 10)));
            var count = Math.max(1, Math.min(50, parseInt(document.getElementById('keyCount').value || '1', 10)));
            var prefix = document.getElementById('keyPrefix').value || '';

            var output = '';
            var keys = [];

            for (var i = 0; i < count; i++) {
                var key;
                switch (currentKeyType) {
                    case 'api': key = generateBase62(length); break;
                    case 'uuid': key = generateUUID(); break;
                    case 'base62': key = generateBase62(length); break;
                    case 'hex': key = generateHex(length); break;
                    case 'jwt': key = generateBase62(Math.max(64, length)); break;
                    case 'custom': key = generateCustom(length); break;
                    default: key = generateBase62(length);
                }

                if (currentKeyType !== 'uuid' && prefix) {
                    key = prefix + key;
                }

                keys.push(key);
                output += key + (count > 1 ? '\n' : '');
            }

            document.getElementById('result').value = output.trim();

            keys.forEach(function(key) {
                if (key && key !== '请至少选择一种字符集') {
                    saveToHistory(key, currentKeyType);
                }
            });

            renderHistory();
        }

        function saveToHistory(key, type) {
            var history = getHistory();
            var index = history.findIndex(function(h) { return h.key === key; });
            if (index > -1) {
                history.splice(index, 1);
            }
            history.unshift({ key: key, type: type, time: Date.now() });
            if (history.length > 20) {
                history.pop();
            }
            localStorage.setItem('key_generator_history', JSON.stringify(history));
        }

        function getHistory() {
            try {
                var data = localStorage.getItem('key_generator_history');
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

       function renderHistory() {
           var history = getHistory();
           var container = document.getElementById('keyHistoryContainer');
           var listEl = document.getElementById('keyHistoryList');

            if (history.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            listEl.innerHTML = '';

            var typeLabels = {
                api: 'API', uuid: 'UUID', base62: 'B62', hex: 'HEX', jwt: 'JWT', custom: 'CUS'
            };

            history.forEach(function(item) {
               var div = document.createElement('div');
               div.className = 'key-history-item';

                var content = document.createElement('div');
                content.style.display = 'flex';
                content.style.alignItems = 'center';
                content.style.flex = '1';
                content.style.minWidth = '0';

                var badge = document.createElement('span');
                badge.className = 'key-type-badge';
                badge.textContent = typeLabels[item.type] || 'KEY';

               var keyEl = document.createElement('span');
               keyEl.className = 'key-history-key';
                keyEl.title = item.key;
                keyEl.textContent = item.key;
                keyEl.addEventListener('click', function() { copyHistoryKey(item.key); });

               var copyBtn = document.createElement('button');
               copyBtn.className = 'key-btn-history-copy';
                copyBtn.type = 'button';
                copyBtn.textContent = '复制';
                copyBtn.addEventListener('click', function() { copyHistoryKey(item.key); });

                content.appendChild(badge);
                content.appendChild(keyEl);
                div.appendChild(content);
                div.appendChild(copyBtn);
                listEl.appendChild(div);
            });
        }

        function copyHistoryKey(key) {
            document.getElementById('result').value = key;
            copyToClipboard(key);
        }

        function copyKeyResult(button) {
            var key = document.getElementById('result').value;
            copyToClipboard(key);
        }

        function clearAll() {
            document.getElementById('result').value = '';
        }

        function clearHistory() {
            localStorage.removeItem('key_generator_history');
            renderHistory();
        }

        document.getElementById('keyLength').addEventListener('input', generate);
        document.getElementById('keyCount').addEventListener('input', generate);

        renderHistory();
        generate();
    </script>
</body>
</html>
