<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板历史 - 复制粘贴记录管理</title>
    <link rel="icon" type="image/png" href="icons/clipboard-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="icons/clipboard.svg">
    <link rel="shortcut icon" href="icons/clipboard-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/clipboard-apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- 主题闪烁防护（必须在 CSS 之前） -->
    <script>
        (function(){
            var t=localStorage.getItem('theme');
            if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            document.documentElement.setAttribute('data-theme',t);
        })();
    </script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/loading.css">

    <style>
        :root {
            --color-primary: var(--color-tool-clipboard);
            --color-primary-dark: var(--color-tool-clipboard-dark);
            --color-primary-light: var(--color-tool-clipboard-light);
            --color-primary-ring: var(--color-tool-clipboard-ring);
        }

        body {
            background-color: var(--color-gray-50);
            color: var(--color-gray-700);
            min-height: 100vh;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 1rem;
        }

        .container {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .header {
            background: var(--color-primary);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header h1 i {
            margin-right: 0.5rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .toolbar {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .clipboard-search {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .clipboard-search i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
        }

        .clipboard-search input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: var(--transition-normal);
        }

        .clipboard-search input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px var(--color-primary-light);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
        }

        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--color-gray-300);
            transition: var(--transition-normal);
            border-radius: 22px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: var(--transition-normal);
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--color-primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(18px);
        }

        .btn {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: var(--transition-normal);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-danger {
            background-color: var(--color-danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: #DC2626;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-bar {
            display: flex;
            gap: 1.5rem;
            font-size: 0.875rem;
            color: var(--color-gray-500);
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--color-gray-200);
        }

        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .stats-bar i {
            color: var(--color-primary);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: var(--color-gray-100);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--color-gray-300);
            border-radius: 3px;
        }

        .clipboard-item {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            background: var(--color-gray-50);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-gray-200);
            transition: var(--transition-normal);
        }

        .clipboard-item:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px var(--color-primary-light);
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-text {
            font-size: 0.875rem;
            color: var(--color-gray-700);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
        }

        .item-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: var(--color-gray-400);
        }

        .item-meta i {
            margin-right: 0.25rem;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            border: none;
            cursor: pointer;
            transition: var(--transition-normal);
            background: var(--color-gray-100);
            color: var(--color-gray-600);
        }

        .btn-icon:hover {
            background: var(--color-primary);
            color: white;
        }

        .btn-icon.btn-delete:hover {
            background: var(--color-danger);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--color-gray-400);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.875rem;
        }




        /* 深色模式 - 页面特有样式（输入框由 themes.css 全局处理） */
        [data-theme="dark"] .toggle-container {
            background-color: var(--color-gray-100);
        }
        [data-theme="dark"] .clipboard-item {
            background-color: var(--color-gray-100);
            border-color: var(--color-gray-200);
        }
        [data-theme="dark"] .btn-icon {
            background-color: var(--color-gray-200);
            color: var(--color-gray-600);
        }
        [data-theme="dark"] .btn-danger:hover {
            background-color: #F87171;
        }
        [data-theme="dark"] .empty-state {
            color: var(--color-gray-500);
        }
        [data-theme="dark"] .stats-bar {
            color: var(--color-gray-400);
        }

        @media (max-width: 640px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .toggle-container {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="page-content">
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-clipboard-list"></i>剪贴板历史记录</h1>
            <p>自动记录复制的文本内容，一键找回历史记录</p>
        </div>
        <div class="content">
            <div class="toolbar">
                <div class="clipboard-search">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="搜索历史记录..." oninput="renderHistory()">
                </div>
                <div class="toggle-container">
                    <span>监控系统剪贴板</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="monitorToggle" checked onchange="toggleMonitor()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button class="btn btn-danger" id="clearBtn" onclick="clearAll()" disabled>
                    <i class="fas fa-trash"></i>清空全部
                </button>
            </div>
            <div class="stats-bar">
                <span><i class="fas fa-list"></i>共 <strong id="totalCount">0</strong> 条记录</span>
                <span><i class="fas fa-database"></i>本地存储，隐私安全</span>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">
                    <i class="fas fa-clipboard"></i>
                    <p>暂无剪贴板记录</p>
                    <p style="margin-top: 0.5rem; font-size: 0.75rem;">复制任意文本后将自动记录</p>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- 共享 JS（严格按依赖顺序） -->
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/copy.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/loading.js"></script>
    <script src="js/components/navbar.js"></script>

    <script>
        var STORAGE_KEY = 'clipboard_history';
        var MAX_HISTORY = 50;
        var monitorEnabled = true;

        function getHistory() {
            try {
                var data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function addToHistory(text) {
            if (!text || !text.trim()) return;

            var trimmed = text.trim();
            var history = getHistory();

            var filtered = history.filter(function(item) { return item.text !== trimmed; });
            filtered.unshift({ text: trimmed, timestamp: Date.now() });

            if (filtered.length > MAX_HISTORY) {
                filtered.pop();
            }

            saveHistory(filtered);
            renderHistory();
        }

        function deleteItem(index) {
            var history = getHistory();
            history.splice(index, 1);
            saveHistory(history);
            renderHistory();
            Toast.success('已删除');
        }

        function clearAll() {
            if (!confirm('确定要清空所有历史记录吗？')) return;
            localStorage.removeItem(STORAGE_KEY);
            renderHistory();
            Toast.success('已清空所有记录');
        }

        function formatTime(timestamp) {
            var now = Date.now();
            var diff = now - timestamp;
            var minutes = Math.floor(diff / 60000);
            var hours = Math.floor(diff / 3600000);
            var days = Math.floor(diff / 86400000);

            if (diff < 60000) return '刚刚';
            if (minutes < 60) return minutes + '分钟前';
            if (hours < 24) return hours + '小时前';
            if (days < 7) return days + '天前';

            var date = new Date(timestamp);
            return (date.getMonth() + 1) + '/' + date.getDate() + ' ' + date.getHours() + ':' + String(date.getMinutes()).padStart(2, '0');
        }

        function renderHistory() {
            var history = getHistory();
            var searchTerm = document.getElementById('searchInput').value.toLowerCase();
            var container = document.getElementById('historyList');
            var clearBtn = document.getElementById('clearBtn');

            var filtered = history.filter(function(item) {
                return item.text.toLowerCase().includes(searchTerm);
            });

            document.getElementById('totalCount').textContent = filtered.length;
            clearBtn.disabled = history.length === 0;

            container.textContent = '';

            if (filtered.length === 0) {
                var emptyState = document.createElement('div');
                emptyState.className = 'empty-state';

                var icon = document.createElement('i');
                icon.className = 'fas fa-clipboard';

                var title = document.createElement('p');
                title.textContent = history.length === 0 ? '暂无剪贴板记录' : '未找到匹配的记录';

                var tip = document.createElement('p');
                tip.style.marginTop = '0.5rem';
                tip.style.fontSize = '0.75rem';
                tip.textContent = history.length === 0 ? '复制任意文本后将自动记录' : '试试其他关键词';

                emptyState.appendChild(icon);
                emptyState.appendChild(title);
                emptyState.appendChild(tip);
                container.appendChild(emptyState);
                return;
            }

            filtered.forEach(function(item) {
                var historyItem = document.createElement('div');
                historyItem.className = 'clipboard-item';

                var content = document.createElement('div');
                content.className = 'item-content';

                var text = document.createElement('div');
                text.className = 'item-text';
                text.textContent = item.text;

                var meta = document.createElement('div');
                meta.className = 'item-meta';

                var time = document.createElement('span');
                var timeIcon = document.createElement('i');
                timeIcon.className = 'far fa-clock';
                time.appendChild(timeIcon);
                time.appendChild(document.createTextNode(formatTime(item.timestamp)));

                var length = document.createElement('span');
                var lengthIcon = document.createElement('i');
                lengthIcon.className = 'far fa-file-alt';
                length.appendChild(lengthIcon);
                length.appendChild(document.createTextNode(item.text.length + ' 字符'));

                meta.appendChild(time);
                meta.appendChild(length);
                content.appendChild(text);
                content.appendChild(meta);

                var actions = document.createElement('div');
                actions.className = 'item-actions';

                var copyBtn = document.createElement('button');
                copyBtn.className = 'btn-icon';
                copyBtn.type = 'button';
                copyBtn.title = '复制';
                copyBtn.addEventListener('click', function() { window.copyToClipboard(item.text, { toast: true, successMsg: '已复制', errorMsg: '复制失败' }); });
                var copyIcon = document.createElement('i');
                copyIcon.className = 'fas fa-copy';
                copyBtn.appendChild(copyIcon);

                var deleteBtn = document.createElement('button');
                deleteBtn.className = 'btn-icon btn-delete';
                deleteBtn.type = 'button';
                deleteBtn.title = '删除';
                deleteBtn.addEventListener('click', function() { deleteItem(history.indexOf(item)); });
                var deleteIcon = document.createElement('i');
                deleteIcon.className = 'fas fa-times';
                deleteBtn.appendChild(deleteIcon);

                actions.appendChild(copyBtn);
                actions.appendChild(deleteBtn);
                historyItem.appendChild(content);
                historyItem.appendChild(actions);
                container.appendChild(historyItem);
            });
        }


        document.addEventListener('copy', function() {
            setTimeout(function() {
                var text = window.getSelection().toString();
                if (text && text.trim()) {
                    addToHistory(text.trim());
                }
            }, 10);
        });

        function handleClipboardChange() {
            navigator.clipboard.readText().then(function(text) {
                if (text && text.trim()) {
                    addToHistory(text.trim());
                }
            }).catch(function(e) {
            });
        }

        function toggleMonitor() {
            var toggle = document.getElementById('monitorToggle');
            if (toggle.checked) {
                navigator.clipboard.readText().then(function() {
                    if (navigator.clipboard.addEventListener) {
                        navigator.clipboard.addEventListener('clipboardchange', handleClipboardChange);
                        monitorEnabled = true;
                        Toast.success('系统剪贴板监控已开启');
                    } else {
                        Toast.error('当前浏览器不支持系统剪贴板监控');
                        toggle.checked = false;
                    }
                }).catch(function(e) {
                    Toast.error('权限被拒绝，无法监控系统剪贴板');
                    toggle.checked = false;
                });
            } else {
                if (navigator.clipboard.removeEventListener) {
                    navigator.clipboard.removeEventListener('clipboardchange', handleClipboardChange);
                }
                monitorEnabled = false;
                Toast.success('系统剪贴板监控已关闭');
            }
        }

        renderHistory();
        toggleMonitor();
    </script>
</body>
</html>
