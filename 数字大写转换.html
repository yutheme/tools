<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字大写转换工具</title>
    <link rel="icon" type="image/png" href="icons/number-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="icons/number.svg">
    <link rel="shortcut icon" href="icons/number-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/number-apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <!-- 主题闪烁防护（必须在 CSS 之前） -->
    <script>
        (function(){
            var t=localStorage.getItem('theme');
            if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
            document.documentElement.setAttribute('data-theme',t);
        })();
    </script>

    <!-- CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- 共享 CSS -->
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/loading.css">

    <style>
        :root {
            --color-primary: var(--color-tool-number);
            --color-primary-dark: var(--color-tool-number-dark);
            --color-primary-light: var(--color-tool-number-light);
            --color-primary-ring: var(--color-tool-number-ring);
        }

        body {
            background-color: var(--color-gray-50);
            color: var(--color-gray-700);
            min-height: 100vh;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 56px);
            padding: 1rem;
        }

        .container {
            background: var(--color-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: white;
            padding: 1.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.875rem;
            opacity: 0.8;
        }

        .content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .copy-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-gray-400);
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--transition-normal);
        }

        .input-wrapper .copy-btn:hover {
            color: var(--color-primary);
        }

        .error-box {
            padding: 0.75rem;
            background: #FEF2F2;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #DC2626;
            font-size: 0.875rem;
            display: none;
            transition: all var(--transition-normal);
        }

        [data-theme="dark"] .error-box {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(248, 113, 113, 0.3);
            color: #FCA5A5;
        }

        .error-box.show {
            display: block;
        }

        .footer {
            padding: 0.75rem 1.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--color-gray-400);
        }

        @media (max-width: 480px) {
            .page-content {
                padding: 0.5rem;
            }

            .content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-content">
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-right-left"></i>
                数字大写转换工具
            </h1>
            <p>支持阿拉伯数字和中文数字转换为大写金额</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label for="numberInput">
                    <i class="fas fa-keyboard"></i>
                    输入数字：
                </label>
                <input
                    type="text"
                    id="numberInput"
                    placeholder="例如：1234.56 或 一千二百三十四 或 一二三"
                >
                <p class="hint" style="font-size:0.75rem;color:var(--color-gray-400);">支持阿拉伯数字、中文数字（一二三）、小数和大额数字</p>
            </div>

            <div class="form-group">
                <label for="resultOutput">
                    <i class="fas fa-font"></i>
                    大写结果：
                </label>
                <div class="input-wrapper">
                    <input
                        type="text"
                        id="resultOutput"
                        readonly
                    >
                    <button id="copyBtn" class="copy-btn" title="复制结果">
                        <i class="fas fa-clipboard"></i>
                    </button>
                </div>
            </div>

            <div id="errorBox" class="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMsg"></span>
            </div>
        </div>

        <div class="footer">
            <p>© 2025 数字大写转换工具 | 支持多种数字格式转换，符合财务规范</p>
        </div>
    </div>
    </div>

    <!-- 共享 JS（严格按依赖顺序） -->
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/debounce.js"></script>
    <script src="js/utils/copy.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/theme.js"></script>
    <script src="js/utils/loading.js"></script>
    <script src="js/components/navbar.js"></script>

    <!-- 工具专属 JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var NumberConverter = {
                digits: ['零', '壹', '贰', '叁', '肆', '伍', '陆', '柒', '捌', '玖'],
                units: ['', '拾', '佰', '仟'],
                sectionUnits: ['', '万', '亿', '兆', '京', '垓', '秭', '穰', '沟', '涧', '正', '载'],
                chineseToArabic: {
                    '零': 0, '一': 1, '二': 2, '三': 3, '四': 4,
                    '五': 5, '六': 6, '七': 7, '八': 8, '九': 9,
                    '十': 10, '百': 100, '千': 1000, '万': 10000,
                    '亿': 100000000, '兆': 1000000000000
                },

                convert: function(input) {
                    if (!input || input.trim() === '') {
                        throw new Error('请输入有效的数字');
                    }

                    var numStr = input.trim();
                    var isChineseNumber = false;

                    if (/[一-龥]/.test(numStr)) {
                        isChineseNumber = true;
                        numStr = this.convertChineseToArabic(numStr).toString();
                    } else {
                        numStr = numStr.replace(/,/g, '');
                    }

                    if (!/^-?\d+(\.\d{1,2})?$/.test(numStr)) {
                        throw new Error('请输入有效的数字（整数、最多两位小数）');
                    }

                    var isNegative = false;
                    if (numStr.startsWith('-')) {
                        isNegative = true;
                        numStr = numStr.slice(1);
                    }

                    var parts = numStr.split('.');
                    var integerPart = parts[0];
                    var decimalPart = parts[1] || '';

                    if (integerPart === '0' && decimalPart === '') {
                        return '零元整';
                    }

                    var integerResult = this.convertInteger(integerPart);
                    var decimalResult = this.convertDecimal(decimalPart);
                    var result = integerResult + decimalResult;

                    if (isNegative) {
                        result = '负' + result;
                    }

                    return result;
                },

                convertChineseToArabic: function(chinese) {
                    chinese = chinese.replace(/两/g, '二')
                                     .replace(/廿/g, '二十')
                                     .replace(/卅/g, '三十')
                                     .replace(/佰/g, '百')
                                     .replace(/仟/g, '千')
                                     .replace(/元/g, '')
                                     .replace(/角/g, '.')
                                     .replace(/分/g, '');

                    var integerPart = chinese;
                    var decimalPart = '';
                    var dotIndex = chinese.indexOf('.');
                    if (dotIndex !== -1) {
                        integerPart = chinese.substring(0, dotIndex);
                        decimalPart = chinese.substring(dotIndex + 1);
                    }

                    var result = this.parseIntegerPart(integerPart);
                    if (decimalPart) {
                        result += this.parseDecimalPart(decimalPart);
                    }

                    return Math.round(result * 100) / 100;
                },

                parseIntegerPart: function(integerStr) {
                    if (!integerStr) return 0;

                    var total = 0;
                    var currentGroup = 0;
                    var currentNumber = 0;

                    if (integerStr.startsWith('十')) {
                        currentNumber = 10;
                        integerStr = integerStr.substring(1);
                    }

                    for (var i = 0; i < integerStr.length; i++) {
                        var char = integerStr[i];
                        var value = this.chineseToArabic[char];

                        if (value === undefined) {
                            throw new Error('包含无效的中文数字字符: ' + char);
                        }

                        if (value < 10) {
                            currentNumber = currentNumber * 10 + value;
                        } else if (value < 10000) {
                            if (currentNumber === 0) {
                                currentGroup += value;
                            } else {
                                currentGroup += currentNumber * value;
                                currentNumber = 0;
                            }
                        } else {
                            total += (currentGroup + currentNumber) * value;
                            currentGroup = 0;
                            currentNumber = 0;
                        }
                    }

                    total += currentGroup + currentNumber;
                    return total;
                },

                parseDecimalPart: function(decimalStr) {
                    var result = 0;
                    if (decimalStr.length >= 1) {
                        var jiao = this.chineseToArabic[decimalStr[0]] || 0;
                        result += jiao * 0.1;
                    }
                    if (decimalStr.length >= 2) {
                        var fen = this.chineseToArabic[decimalStr[1]] || 0;
                        result += fen * 0.01;
                    }
                    return result;
                },

                convertInteger: function(integerPart) {
                    if (integerPart === '0') return '';

                    var result = '';
                    var sectionCount = 0;
                    var intPart = integerPart;

                    while (intPart.length > 0) {
                        var section = intPart.slice(-4);
                        intPart = intPart.slice(0, -4);

                        var sectionResult = this.convertSection(section);

                        if (sectionResult && sectionCount < this.sectionUnits.length) {
                            sectionResult += this.sectionUnits[sectionCount];
                        }

                        result = sectionResult + result;
                        sectionCount++;
                    }

                    result = result.replace(/零+/g, '零').replace(/零$/, '');

                    if (result === '') return '零元整';

                    return result + '元';
                },

                convertSection: function(section) {
                    var sectionResult = '';
                    var hasNonZero = false;

                    for (var i = 0; i < section.length; i++) {
                        var digit = parseInt(section[i], 10);
                        var position = section.length - 1 - i;

                        if (digit !== 0) {
                            if (sectionResult.endsWith('零')) {
                                sectionResult = sectionResult.slice(0, -1);
                            }
                            sectionResult += this.digits[digit] + this.units[position];
                            hasNonZero = true;
                        } else if (hasNonZero) {
                            sectionResult += '零';
                        }
                    }

                    sectionResult = sectionResult.replace(/零+$/, '');

                    if (sectionResult.startsWith('壹拾')) {
                        sectionResult = sectionResult.slice(1);
                    }

                    return sectionResult;
                },

                convertDecimal: function(decimalPart) {
                    if (!decimalPart) return '整';

                    var jiao = decimalPart.length >= 1 ? parseInt(decimalPart[0], 10) : 0;
                    var fen = decimalPart.length >= 2 ? parseInt(decimalPart[1], 10) : 0;

                    var result = '';
                    if (jiao > 0) result += this.digits[jiao] + '角';
                    if (fen > 0) result += this.digits[fen] + '分';

                    if (jiao === 0 && fen === 0) result = '整';

                    return result;
                }
            };
            // DOM元素
            const numberInput = document.getElementById('numberInput');
            const resultOutput = document.getElementById('resultOutput');
            const copyBtn = document.getElementById('copyBtn');
            const errorBox = document.getElementById('errorBox');
            const errorMsg = document.getElementById('errorMsg');
            
            // 延迟时间（毫秒）
            const INPUT_DELAY = 500;

            const convertInput = debounce(function(inputValue) {
                try {
                    // 执行转换并输出
                    const result = NumberConverter.convert(inputValue);
                    resultOutput.value = result;

                    // 视觉反馈
                    resultOutput.style.borderColor = 'var(--color-primary)';
                    setTimeout(() => {
                        resultOutput.style.borderColor = 'var(--color-gray-200)';
                    }, 300);
                } catch (error) {
                    errorMsg.textContent = error.message;
                    errorBox.classList.add('show');
                }
            }, INPUT_DELAY);

            // 输入处理 - 使用共享 debounce 延迟验证
            numberInput.addEventListener('input', function() {
                var inputValue = this.value.trim();

                // 立即清空结果和错误提示，提供即时反馈
                resultOutput.value = '';
                errorBox.classList.remove('show');

                if (inputValue === '') {
                    convertInput.cancel();
                    return;
                }

                convertInput(inputValue);
            });
            
            // 复制功能 - 使用共享复制工具，包含 Clipboard API 和降级方案
            copyBtn.addEventListener('click', async function() {
                const copied = await window.copyToClipboard(resultOutput.value, {
                    successMsg: '转换结果已复制',
                    errorMsg: '复制失败，请手动复制'
                });

                if (copied) {
                    this.innerHTML = '<i class="fas fa-check"></i>';
                    setTimeout(() => {
                        this.innerHTML = '<i class="fas fa-clipboard"></i>';
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
